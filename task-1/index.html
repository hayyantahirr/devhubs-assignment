<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevHub</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <nav class="navbar gap-24">
      <div class="nav-div-1 ">
        <div >
          <img
            src="./assets/assets/Layout/Brand/logo-colored.png"
            class="nav-logo"
          />
        </div>
        <div class="flex justify-center items-center gap-24 flex-wrap">
          <div class="flex w-144">
            <input
              type="text"
              class="h-[40px] w-full rounded-l-lg border"
              placeholder="Search"
            />
            <select name="categories" id="" class="border">
              <option value="" selected class="border-[#03a9f4]">
                All Categories
              </option>
              <option value="Electronics">Electronics</option>
              <option value="Clothing">Clothing</option>
              <option value="Interior">Interior</option>
            </select>
            <button
              type="submit"
              class="bg-[#03a9f4] text-white w-32 rounded-r-lg"
            >
              Search
            </button>
          </div>
          <ul class="nav-list flex gap-6">
            <li class="flex flex-col items-center justify-center text-center">
              <img src="./assets/assets/navbar-icons/profile.svg" alt="" />
              Profile
            </li>
            <li class="flex flex-col items-center justify-center text-center">
              <img src="./assets/assets/navbar-icons/message.svg" alt="" />
              Message
            </li>
            <li class="flex flex-col items-center justify-center text-center">
              <img
                src="./assets/assets/navbar-icons/heart(orders).svg"
                alt=""
              />Orders
            </li>
            <li class="flex flex-col items-center justify-center text-center">
              <img src="./assets/assets/navbar-icons/cart.svg" alt="" />My Cart
            </li>
          </ul>
        </div>
      </div>
      <div class="flex justify-around">
        <ul class="nav-div-2">
          <li class="flex ">
            <img src="./assets/assets/navbar-icons/hamburger.svg" alt="" />All
            Categories
          </li>
          <li>Hot Offers</li>
          <li>Gift Boxes</li>
          <li>Projects</li>
          <li>Menu Items</li>
          <li>Help</li>
        </ul>
      </div>
    </nav>
    <footer></footer>
  </body>
</html>
